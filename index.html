<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hermes Platform — Integration Control Plane by Alden Merlin" />
    <title>Hermes Platform</title>
    <!--
      Theme initialization script — must run before React hydrates.
      Reads localStorage and sets data-theme on <html> synchronously,
      preventing any flash of wrong theme on load.
    -->
    <script>
      (function () {
        var KEY = 'hermes-platform-theme'
        var saved = null
        try { saved = localStorage.getItem(KEY) } catch (_) {}
        var theme = (saved === 'light' || saved === 'dark') ? saved : 'dark'
        document.documentElement.setAttribute('data-theme', theme)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
