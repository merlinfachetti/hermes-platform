<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hermes Platform — Integration Control Plane by Alden Merlin" />
    <title>Hermes Platform</title>
    <!--
      Blocking theme script — runs synchronously before any CSS or React loads.
      Sets data-theme AND color-scheme on <html> so the browser paints the
      correct background on the very first frame. No flash, no transition.
    -->
    <script>
      (function () {
        var KEY = 'hermes-platform-theme'
        var saved = null
        try { saved = localStorage.getItem(KEY) } catch (_) {}
        var theme = (saved === 'light' || saved === 'dark') ? saved : 'dark'
        var el = document.documentElement
        el.setAttribute('data-theme', theme)
        el.style.colorScheme = theme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
